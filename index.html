<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Neuro Video</title>
</head>
<body>
  <h1>🎬 Создай своё видео</h1>

  <input type="file" id="photo" accept="image/*" />
  <br><br>

  <button onclick="sendPhoto()">Создать видео</button>

  <script>
    function sendPhoto() {
      const file = document.getElementById('photo').files[0];
      
      if (!file) {
        alert('Загрузи фото');
        return;
      }

      alert('Фото загружено! 🚀 (скоро тут будет генерация видео)');
    }
  </script>
</body>
</html>
