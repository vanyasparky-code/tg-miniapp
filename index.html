<script>
  // Получаем параметр из URL
  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get('startapp');

  let prompt = "";

  if (mode === "repeat") {
    prompt = "Повтори стиль видео: cinematic portrait, dramatic lighting, slow motion";
    alert("Режим повтора активирован 🔁");
  }

  function sendPhoto() {
    const file = document.getElementById('photo').files[0];
    
    if (!file) {
      alert('Загрузи фото');
      return;
    }

    console.log("PROMPT:", prompt);

    alert("Фото отправлено 🚀\nСкоро будет генерация видео");
  }
</script>
