<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta charset="UTF-8">
  <title>Neuro Video</title>
  <style>
  * {
    box-sizing: border-box;
  }

  html {
    width: 100%;
    min-height: 100%;
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(124, 58, 237, 0.28), transparent 36%),
      linear-gradient(180deg, #111827 0%, #080c18 100%);
    color: #ffffff;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 520px;
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0 auto;
    padding: 22px 18px calc(28px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .hero {
    padding-top: 14px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.13);
    color: rgba(255, 255, 255, 0.82);
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  h1 {
    margin: 0;
    font-size: clamp(34px, 9vw, 48px);
    line-height: 0.98;
    letter-spacing: -0.055em;
    font-weight: 900;
  }

  .subtitle {
    margin: 16px 0 0;
    color: rgba(255, 255, 255, 0.72);
    font-size: clamp(16px, 4.3vw, 19px);
    line-height: 1.45;
  }

  .card {
    width: 100%;
    margin-top: 4px;
    padding: 18px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.105);
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: 0 22px 70px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(18px);
  }

  #photo {
    display: none;
  }

  .upload-box {
    width: 100%;
    min-height: 230px;
    padding: 28px 18px;
    border-radius: 24px;
    border: 2px dashed rgba(255, 255, 255, 0.32);
    background: rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    cursor: pointer;
  }

  .upload-box:active,
  .primary-button:active {
    transform: scale(0.985);
  }

  .upload-icon {
    width: 72px;
    height: 72px;
    border-radius: 24px;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.15);
    font-size: 34px;
  }

  .upload-title {
    margin-top: 6px;
    font-size: 23px;
    line-height: 1.15;
    font-weight: 850;
  }

  .upload-text {
    max-width: 300px;
    color: rgba(255, 255, 255, 0.62);
    font-size: 16px;
    line-height: 1.35;
    word-break: break-word;
  }

  .primary-button {
    width: 100%;
    height: 62px;
    margin-top: 18px;
    border: 0;
    border-radius: 20px;
    background: linear-gradient(135deg, #8b5cf6, #2563eb);
    color: #ffffff;
    font-size: 19px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 16px 38px rgba(37, 99, 235, 0.38);
  }

  .primary-button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .hint {
    margin: 16px 4px 0;
    color: rgba(255, 255, 255, 0.58);
    font-size: 15px;
    line-height: 1.42;
    text-align: center;
  }

  @media (max-width: 360px) {
    .app {
      padding-left: 14px;
      padding-right: 14px;
    }

    .card {
      padding: 14px;
      border-radius: 24px;
    }

    .upload-box {
      min-height: 210px;
    }

    .primary-button {
      height: 58px;
      font-size: 18px;
    }
  }
</style>
</style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="badge">AI Video</div>

      <h1>Создай своё видео</h1>

      <p class="subtitle">
        Загрузи своё фото — бот создаст видео в этом стиле и пришлёт результат в Telegram.
      </p>
    </section>

    <section class="card">
      <label class="upload-box" for="photo">
        <div class="upload-icon">📸</div>
        <div class="upload-title">Выбрать фото</div>
        <div class="upload-text" id="fileName">JPG или PNG, портретное фото</div>
      </label>

      <input id="photo" type="file" accept="image/*" />

      <button class="primary-button" onclick="sendPhoto()">
        Создать видео
      </button>

      <p class="hint">
        После загрузки бот напишет, когда видео будет готово.
      </p>
    </section>
  </main>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wkgvsajgiqziotuenkrj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZ3ZzYWpnaXF6aW90dWVua3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTQyMjIsImV4cCI6MjA5MzQ3MDIyMn0.MsfW_3sWIcKT934By281v0mHohZTS_W1eyRBE-Jm57w";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tg = window.Telegram?.WebApp;
tg?.ready();

const telegramUserId = tg?.initDataUnsafe?.user?.id
  ? String(tg.initDataUnsafe.user.id)
  : null;
    const urlParams = new URLSearchParams(window.location.search);
let templateSlug =
  urlParams.get('template') ||
  urlParams.get('startapp') ||
  tg?.initDataUnsafe?.start_param ||
  'repeat_001';

if (templateSlug === 'repeat') {
  templateSlug = 'repeat_001';
}

console.log('Template slug:', templateSlug);

    async function sendPhoto() {
      const file = document.getElementById('photo').files[0];
      if (!telegramUserId) {
         alert('Открой приложение через Telegram, чтобы мы знали, кому отправить видео');
         return;
         }
         

      if (!file) {
        alert('Загрузи фото');
        return;
      }

      const fileName = Date.now() + "_" + file.name;

      const { error: uploadError } = await supabaseClient
        .storage
        .from('media')
        .upload(fileName, file);

      if (uploadError) {
        alert('Ошибка загрузки фото');
        console.error(uploadError);
        return;
      }

      const publicUrl = supabaseClient
        .storage
        .from('media')
        .getPublicUrl(fileName).data.publicUrl;

      const { error } = await supabaseClient
        .from('orders')
        .insert([
          {
            telegram_user_id: telegramUserId,
            template_slug: templateSlug,
            original_photo_url: publicUrl,
            status: 'photo_uploaded'
          }
        ]);

      if (error) {
        alert('Ошибка создания заказа');
        console.error(error);
        return;
      }

      tg.showPopup(
  {
    title: "ПОВТОРИ ВИДЕО БОТ",
    message:
      "Фото принято 🚀\n\n" +
      "Генерация началась. Скоро видео будет готово.\n\n" +
      "Пока вы можете закрыть приложение.",
    buttons: [
      { id: "ok", type: "default", text: "OK" }
    ]
  },
  function () {
    tg.close();
  }
);
    }
    const photoInput = document.getElementById('photo');
const fileName = document.getElementById('fileName');

photoInput?.addEventListener('change', () => {
  const file = photoInput.files?.[0];

  if (file) {
    fileName.textContent = file.name;
  } else {
    fileName.textContent = 'JPG или PNG, портретное фото';
  }
});
  </script>
</body>
</html>
